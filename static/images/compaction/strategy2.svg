<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 320" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <marker id="arrow2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <filter id="soft2" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.2"/>
      <feOffset dx="0" dy="1"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="720" height="320" fill="#fafafa"/>

  <text x="360" y="30" text-anchor="middle" font-size="15" font-weight="600" fill="#0f172a">Strategy 2: Preserve user messages</text>

  <text x="40" y="80" font-size="10" font-weight="600" fill="#94a3b8" letter-spacing="1">BEFORE</text>

  <!-- top row: user msgs solid, agent msgs dimmed with X overlay -->
  <g transform="translate(120, 60)" filter="url(#soft2)">
    <rect x="0"   y="0" width="50" height="42" rx="5" fill="#3b82f6"/>
    <rect x="54"  y="0" width="50" height="42" rx="5" fill="#cbd5e1" opacity="0.7"/>
    <rect x="108" y="0" width="50" height="42" rx="5" fill="#cbd5e1" opacity="0.7"/>
    <rect x="162" y="0" width="50" height="42" rx="5" fill="#3b82f6"/>
    <rect x="216" y="0" width="50" height="42" rx="5" fill="#cbd5e1" opacity="0.7"/>
    <rect x="270" y="0" width="50" height="42" rx="5" fill="#cbd5e1" opacity="0.7"/>
    <rect x="324" y="0" width="50" height="42" rx="5" fill="#3b82f6"/>
    <rect x="378" y="0" width="50" height="42" rx="5" fill="#cbd5e1" opacity="0.7"/>
    <rect x="432" y="0" width="50" height="42" rx="5" fill="#cbd5e1" opacity="0.7"/>
  </g>
  <g transform="translate(120, 60)" font-size="13" font-weight="600" text-anchor="middle">
    <text x="25"  y="26" fill="white">U₁</text>
    <text x="79"  y="26" fill="#94a3b8">A₁</text>
    <text x="133" y="26" fill="#94a3b8">T₁</text>
    <text x="187" y="26" fill="white">U₂</text>
    <text x="241" y="26" fill="#94a3b8">A₂</text>
    <text x="295" y="26" fill="#94a3b8">T₂</text>
    <text x="349" y="26" fill="white">U₃</text>
    <text x="403" y="26" fill="#94a3b8">A₃</text>
    <text x="457" y="26" fill="#94a3b8">T₃</text>
  </g>
  <!-- X overlays on dropped agent items -->
  <g transform="translate(120, 60)" stroke="#ef4444" stroke-width="1.8" stroke-linecap="round">
    <g transform="translate(54, 0)"><line x1="14" y1="14" x2="36" y2="28"/><line x1="36" y1="14" x2="14" y2="28"/></g>
    <g transform="translate(108, 0)"><line x1="14" y1="14" x2="36" y2="28"/><line x1="36" y1="14" x2="14" y2="28"/></g>
    <g transform="translate(216, 0)"><line x1="14" y1="14" x2="36" y2="28"/><line x1="36" y1="14" x2="14" y2="28"/></g>
    <g transform="translate(270, 0)"><line x1="14" y1="14" x2="36" y2="28"/><line x1="36" y1="14" x2="14" y2="28"/></g>
    <g transform="translate(378, 0)"><line x1="14" y1="14" x2="36" y2="28"/><line x1="36" y1="14" x2="14" y2="28"/></g>
    <g transform="translate(432, 0)"><line x1="14" y1="14" x2="36" y2="28"/><line x1="36" y1="14" x2="14" y2="28"/></g>
  </g>

  <text x="610" y="86" font-size="11" fill="#dc2626" font-style="italic">✗ pre-trim</text>

  <path d="M 120 116 L 120 124 L 602 124 L 602 116" stroke="#94a3b8" stroke-width="1.5" fill="none"/>
  <text x="361" y="146" text-anchor="middle" font-size="12" fill="#475569" font-style="italic">summarize what remains</text>

  <line x1="361" y1="156" x2="361" y2="194" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow2)"/>

  <text x="40" y="226" font-size="10" font-weight="600" fill="#94a3b8" letter-spacing="1">AFTER</text>

  <g transform="translate(252, 206)" filter="url(#soft2)">
    <rect x="0"   y="0" width="50" height="42" rx="5" fill="#3b82f6"/>
    <rect x="54"  y="0" width="50" height="42" rx="5" fill="#3b82f6"/>
    <rect x="108" y="0" width="50" height="42" rx="5" fill="#3b82f6"/>
    <rect x="166" y="0" width="50" height="42" rx="5" fill="#f59e0b"/>
  </g>
  <g transform="translate(252, 206)" font-size="13" font-weight="600" fill="white" text-anchor="middle">
    <text x="25"  y="26">U₁</text>
    <text x="79"  y="26">U₂</text>
    <text x="133" y="26">U₃</text>
    <text x="191" y="26">S</text>
  </g>

  <!-- annotation brackets for after -->
  <path d="M 252 256 L 252 262 L 410 262 L 410 256" stroke="#94a3b8" stroke-width="1" fill="none"/>
  <text x="331" y="278" text-anchor="middle" font-size="10" fill="#64748b">user msgs (within token budget)</text>
  <path d="M 418 256 L 418 262 L 468 262 L 468 256" stroke="#94a3b8" stroke-width="1" fill="none"/>
  <text x="443" y="278" text-anchor="middle" font-size="10" fill="#64748b">summary</text>

  <text x="361" y="304" text-anchor="middle" font-size="11" fill="#64748b">newest-first selection, chronological order, summary appended at tail</text>

  <g transform="translate(40, 286)" font-size="10" fill="#64748b">
    <rect x="0"   y="0" width="10" height="10" rx="2" fill="#3b82f6"/><text x="14" y="9">user</text>
    <rect x="56"  y="0" width="10" height="10" rx="2" fill="#cbd5e1"/><text x="70" y="9">dropped</text>
    <rect x="124" y="0" width="10" height="10" rx="2" fill="#f59e0b"/><text x="138" y="9">summary</text>
  </g>
</svg>
