<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 320" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <marker id="arrow3" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <filter id="soft3" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.2"/>
      <feOffset dx="0" dy="1"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="720" height="320" fill="#fafafa"/>

  <text x="360" y="30" text-anchor="middle" font-size="15" font-weight="600" fill="#0f172a">Strategy 3: Preserve a recent token fraction</text>

  <text x="40" y="80" font-size="10" font-weight="600" fill="#94a3b8" letter-spacing="1">BEFORE</text>

  <!-- 9 message boxes m1..m9; left 6 are "to be summarized", right 3 preserved -->
  <g transform="translate(120, 60)" filter="url(#soft3)">
    <rect x="0"   y="0" width="50" height="42" rx="5" fill="#cbd5e1"/>
    <rect x="54"  y="0" width="50" height="42" rx="5" fill="#cbd5e1"/>
    <rect x="108" y="0" width="50" height="42" rx="5" fill="#cbd5e1"/>
    <rect x="162" y="0" width="50" height="42" rx="5" fill="#cbd5e1"/>
    <rect x="216" y="0" width="50" height="42" rx="5" fill="#cbd5e1"/>
    <rect x="270" y="0" width="50" height="42" rx="5" fill="#cbd5e1"/>
    <!-- preserved tail in distinct color -->
    <rect x="324" y="0" width="50" height="42" rx="5" fill="#3b82f6"/>
    <rect x="378" y="0" width="50" height="42" rx="5" fill="#94a3b8"/>
    <rect x="432" y="0" width="50" height="42" rx="5" fill="#10b981"/>
  </g>
  <g transform="translate(120, 60)" font-size="13" font-weight="600" text-anchor="middle">
    <text x="25"  y="26" fill="#475569">m₁</text>
    <text x="79"  y="26" fill="#475569">m₂</text>
    <text x="133" y="26" fill="#475569">m₃</text>
    <text x="187" y="26" fill="#475569">m₄</text>
    <text x="241" y="26" fill="#475569">m₅</text>
    <text x="295" y="26" fill="#475569">m₆</text>
    <text x="349" y="26" fill="white">m₇</text>
    <text x="403" y="26" fill="white">m₈</text>
    <text x="457" y="26" fill="white">m₉</text>
  </g>

  <!-- vertical split line -->
  <line x1="442" y1="55" x2="442" y2="115" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="3 3"/>
  <text x="442" y="50" text-anchor="middle" font-size="9" fill="#dc2626" font-weight="600">SPLIT</text>

  <!-- left bracket: older 70% -->
  <path d="M 120 116 L 120 124 L 437 124 L 437 116" stroke="#94a3b8" stroke-width="1.5" fill="none"/>
  <text x="278" y="146" text-anchor="middle" font-size="12" fill="#475569" font-style="italic">older 70% — summarize</text>

  <!-- right bracket: recent 30% -->
  <path d="M 447 116 L 447 124 L 602 124 L 602 116" stroke="#94a3b8" stroke-width="1.5" fill="none"/>
  <text x="524" y="146" text-anchor="middle" font-size="12" fill="#475569" font-style="italic">recent 30% — preserve</text>

  <!-- arrows down -->
  <line x1="278" y1="156" x2="278" y2="194" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow3)"/>
  <line x1="524" y1="156" x2="524" y2="194" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow3)"/>

  <text x="40" y="226" font-size="10" font-weight="600" fill="#94a3b8" letter-spacing="1">AFTER</text>

  <!-- after row: S, m7, m8, m9 -->
  <g transform="translate(252, 206)" filter="url(#soft3)">
    <rect x="0"   y="0" width="50" height="42" rx="5" fill="#f59e0b"/>
    <rect x="58"  y="0" width="50" height="42" rx="5" fill="#3b82f6"/>
    <rect x="112" y="0" width="50" height="42" rx="5" fill="#94a3b8"/>
    <rect x="166" y="0" width="50" height="42" rx="5" fill="#10b981"/>
  </g>
  <g transform="translate(252, 206)" font-size="13" font-weight="600" fill="white" text-anchor="middle">
    <text x="25"  y="26">S</text>
    <text x="83"  y="26">m₇</text>
    <text x="137" y="26">m₈</text>
    <text x="191" y="26">m₉</text>
  </g>

  <!-- annotation brackets for after -->
  <path d="M 252 256 L 252 262 L 302 262 L 302 256" stroke="#94a3b8" stroke-width="1" fill="none"/>
  <text x="277" y="278" text-anchor="middle" font-size="10" fill="#64748b">summary</text>
  <path d="M 310 256 L 310 262 L 468 262 L 468 256" stroke="#94a3b8" stroke-width="1" fill="none"/>
  <text x="389" y="278" text-anchor="middle" font-size="10" fill="#64748b">preserved tail (verbatim)</text>

  <text x="361" y="304" text-anchor="middle" font-size="11" fill="#64748b">split snapped to next user-message boundary; tail starts on a user turn</text>

  <g transform="translate(40, 286)" font-size="10" fill="#64748b">
    <rect x="0"   y="0" width="10" height="10" rx="2" fill="#cbd5e1"/><text x="14" y="9">summarized</text>
    <rect x="84"  y="0" width="10" height="10" rx="2" fill="#3b82f6"/><text x="98" y="9">user</text>
    <rect x="138" y="0" width="10" height="10" rx="2" fill="#94a3b8"/><text x="152" y="9">assistant</text>
    <rect x="220" y="0" width="10" height="10" rx="2" fill="#10b981"/><text x="234" y="9">tool</text>
    <rect x="268" y="0" width="10" height="10" rx="2" fill="#f59e0b"/><text x="282" y="9">summary</text>
  </g>
</svg>
