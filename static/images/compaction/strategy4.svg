<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 340" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <marker id="arrow4" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <filter id="soft4" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.2"/>
      <feOffset dx="0" dy="1"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="720" height="340" fill="#fafafa"/>

  <text x="360" y="30" text-anchor="middle" font-size="15" font-weight="600" fill="#0f172a">Strategy 4: Preserve recent turns</text>

  <!-- Turn group brackets (above) -->
  <g font-size="10" font-weight="600" fill="#64748b" letter-spacing="0.5">
    <text x="159" y="58" text-anchor="middle">T₁</text>
    <text x="293" y="58" text-anchor="middle">T₂</text>
    <text x="427" y="58" text-anchor="middle">T₃</text>
    <text x="561" y="58" text-anchor="middle">T₄</text>
  </g>
  <g stroke="#cbd5e1" stroke-width="1" fill="none">
    <path d="M 96 64 L 96 70 L 222 70 L 222 64"/>
    <path d="M 230 64 L 230 70 L 356 70 L 356 64"/>
    <path d="M 364 64 L 364 70 L 490 70 L 490 64"/>
    <path d="M 498 64 L 498 70 L 624 70 L 624 64"/>
  </g>

  <text x="40" y="100" font-size="10" font-weight="600" fill="#94a3b8" letter-spacing="1">BEFORE</text>

  <!-- 4 turns × 3 boxes; T1, T2 dimmed; T3, T4 colored -->
  <g transform="translate(96, 80)" filter="url(#soft4)">
    <!-- T1 -->
    <rect x="0"   y="0" width="40" height="42" rx="5" fill="#cbd5e1"/>
    <rect x="43"  y="0" width="40" height="42" rx="5" fill="#cbd5e1"/>
    <rect x="86"  y="0" width="40" height="42" rx="5" fill="#cbd5e1"/>
    <!-- T2 -->
    <rect x="134" y="0" width="40" height="42" rx="5" fill="#cbd5e1"/>
    <rect x="177" y="0" width="40" height="42" rx="5" fill="#cbd5e1"/>
    <rect x="220" y="0" width="40" height="42" rx="5" fill="#cbd5e1"/>
    <!-- T3 -->
    <rect x="268" y="0" width="40" height="42" rx="5" fill="#3b82f6"/>
    <rect x="311" y="0" width="40" height="42" rx="5" fill="#94a3b8"/>
    <rect x="354" y="0" width="40" height="42" rx="5" fill="#10b981"/>
    <!-- T4 -->
    <rect x="402" y="0" width="40" height="42" rx="5" fill="#3b82f6"/>
    <rect x="445" y="0" width="40" height="42" rx="5" fill="#94a3b8"/>
    <rect x="488" y="0" width="40" height="42" rx="5" fill="#10b981"/>
  </g>
  <g transform="translate(96, 80)" font-size="11" font-weight="600" text-anchor="middle">
    <text x="20"  y="26" fill="#475569">U</text><text x="63"  y="26" fill="#475569">A</text><text x="106" y="26" fill="#475569">T</text>
    <text x="154" y="26" fill="#475569">U</text><text x="197" y="26" fill="#475569">A</text><text x="240" y="26" fill="#475569">T</text>
    <text x="288" y="26" fill="white">U</text><text x="331" y="26" fill="white">A</text><text x="374" y="26" fill="white">T</text>
    <text x="422" y="26" fill="white">U</text><text x="465" y="26" fill="white">A</text><text x="508" y="26" fill="white">T</text>
  </g>

  <!-- vertical split between T2 and T3 -->
  <line x1="360" y1="76" x2="360" y2="138" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="3 3"/>
  <text x="360" y="71" text-anchor="middle" font-size="9" fill="#dc2626" font-weight="600">SPLIT (N=2)</text>

  <!-- left bracket: older turns -->
  <path d="M 96 138 L 96 146 L 354 146 L 354 138" stroke="#94a3b8" stroke-width="1.5" fill="none"/>
  <text x="225" y="166" text-anchor="middle" font-size="12" fill="#475569" font-style="italic">older turns — summarize</text>

  <!-- right bracket: last 2 turns -->
  <path d="M 366 138 L 366 146 L 624 146 L 624 138" stroke="#94a3b8" stroke-width="1.5" fill="none"/>
  <text x="495" y="166" text-anchor="middle" font-size="12" fill="#475569" font-style="italic">last N=2 turns — preserve</text>

  <line x1="225" y1="176" x2="225" y2="214" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow4)"/>
  <line x1="495" y1="176" x2="495" y2="214" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow4)"/>

  <text x="40" y="246" font-size="10" font-weight="600" fill="#94a3b8" letter-spacing="1">AFTER</text>

  <!-- AFTER: S + T3 (3 boxes) + T4 (3 boxes) -->
  <!-- centering: total width = 50 + 8 + 126 + 8 + 126 = 318 → x = (720-318)/2 = 201 -->
  <g transform="translate(201, 226)" filter="url(#soft4)">
    <rect x="0"   y="0" width="50" height="42" rx="5" fill="#f59e0b"/>
    <!-- T3 -->
    <rect x="58"  y="0" width="40" height="42" rx="5" fill="#3b82f6"/>
    <rect x="101" y="0" width="40" height="42" rx="5" fill="#94a3b8"/>
    <rect x="144" y="0" width="40" height="42" rx="5" fill="#10b981"/>
    <!-- T4 -->
    <rect x="192" y="0" width="40" height="42" rx="5" fill="#3b82f6"/>
    <rect x="235" y="0" width="40" height="42" rx="5" fill="#94a3b8"/>
    <rect x="278" y="0" width="40" height="42" rx="5" fill="#10b981"/>
  </g>
  <g transform="translate(201, 226)" font-size="13" font-weight="600" fill="white" text-anchor="middle">
    <text x="25"  y="26">S</text>
    <text x="78"  y="26" font-size="11">U</text><text x="121" y="26" font-size="11">A</text><text x="164" y="26" font-size="11">T</text>
    <text x="212" y="26" font-size="11">U</text><text x="255" y="26" font-size="11">A</text><text x="298" y="26" font-size="11">T</text>
  </g>

  <!-- annotation brackets for after -->
  <g stroke="#94a3b8" stroke-width="1" fill="none">
    <path d="M 201 276 L 201 282 L 251 282 L 251 276"/>
    <path d="M 259 276 L 259 282 L 385 282 L 385 276"/>
    <path d="M 393 276 L 393 282 L 519 282 L 519 276"/>
  </g>
  <g font-size="10" fill="#64748b" text-anchor="middle">
    <text x="226" y="298">summary</text>
    <text x="322" y="298">T₃ (full)</text>
    <text x="456" y="298">T₄ (full)</text>
  </g>

  <text x="360" y="324" text-anchor="middle" font-size="11" fill="#64748b">turn = one user msg + its agent generation; preserved as full units</text>

  <g transform="translate(40, 306)" font-size="10" fill="#64748b">
    <rect x="0"   y="0" width="10" height="10" rx="2" fill="#cbd5e1"/><text x="14" y="9">summarized</text>
    <rect x="84"  y="0" width="10" height="10" rx="2" fill="#3b82f6"/><text x="98" y="9">user</text>
    <rect x="138" y="0" width="10" height="10" rx="2" fill="#94a3b8"/><text x="152" y="9">assistant</text>
    <rect x="220" y="0" width="10" height="10" rx="2" fill="#10b981"/><text x="234" y="9">tool</text>
    <rect x="268" y="0" width="10" height="10" rx="2" fill="#f59e0b"/><text x="282" y="9">summary</text>
  </g>
</svg>
